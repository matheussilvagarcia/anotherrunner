name: anotherrunner
description: Open-source pedometer and run tracker application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  pedometer: ^4.2.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4
  google_maps_flutter: ^2.15.0
  geolocator: ^14.0.2
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true